name: Generar APK Ayudita

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Ayudita-lista-para-generar-APK-GITHUB/ayv3/mobile/package-lock.json

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Android API 35
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Instalar dependencias
        working-directory: Ayudita-lista-para-generar-APK-GITHUB/ayv3/mobile
        run: |
          npm config set registry https://registry.npmjs.org/
          npm ci

      - name: Copiar frontend
        working-directory: Ayudita-lista-para-generar-APK-GITHUB/ayv3/mobile
        run: npm run sync:www

    - name: Crear y sincronizar Android
  working-directory: Ayudita-lista-para-generar-APK-GITHUB/ayv3/mobile
  run: |
    if [ ! -d "android" ]; then
      npx cap add android
    fi

    npx cap sync android

    python3 - <<'PY'
    from pathlib import Path
    import re

    manifest = Path("android/app/src/main/AndroidManifest.xml")

    contenido = manifest.read_text(encoding="utf-8")

    if "android:usesCleartextTraffic=" in contenido:
        contenido = re.sub(
            r'android:usesCleartextTraffic="[^"]*"',
            'android:usesCleartextTraffic="true"',
            contenido
        )
    else:
        contenido = contenido.replace(
            "<application",
            '<application\n        android:usesCleartextTraffic="true"',
            1
        )

    manifest.write_text(contenido, encoding="utf-8")

    print("HTTP local habilitado correctamente en AndroidManifest.xml")
    PY

      - name: Compilar APK
        working-directory: Ayudita-lista-para-generar-APK-GITHUB/ayv3/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Guardar APK para descargar
        uses: actions/upload-artifact@v4
        with:
          name: Ayudita-debug-apk
          path: Ayudita-lista-para-generar-APK-GITHUB/ayv3/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
