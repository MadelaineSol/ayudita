<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FFFBF4">
  <meta name="description" content="Ayudita 💛 Encontrá personas de confianza para ayudarte: paseadores, electricistas, niñeras y mucho más. Cerca tuyo y al toque.">
  <title>Ayudita — Gente buena que te da una mano</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Splash animado -->
  <div id="splash" class="splash" aria-hidden="true">
    <div class="splash-heart">💛</div>
    <div class="splash-name">Ayudita</div>
  </div>

  <!-- Contenido de la página activa -->
  <main id="app" class="app" aria-live="polite"></main>

  <!-- Barra de navegación inferior (se muestra al iniciar sesión) -->
  <nav id="tabbar" class="tabbar hidden" aria-label="Navegación principal"></nav>

  <!-- Contenedor de toasts -->
  <div id="toasts" class="toasts" aria-live="assertive"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
